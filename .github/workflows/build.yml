name: Build and Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Incluindo os três principais SOs para cobertura total
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # Otimiza o tempo de build em pushes subsequentes

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Ensure models dir exists
      # Criamos a pasta para evitar erro no --add-data caso ela não esteja no git
      run: mkdir -p models

    - name: Build with PyInstaller
      shell: bash
      run: |
        # Gerando a pasta com o nome do produto
        # --onedir: cria uma pasta com o executável e dependências (melhor para debug e apps pesados)
        # --windowed: evita que o console abra ao iniciar o app
        pyinstaller --noconfirm --onedir --windowed \
          --add-data "models:models" \
          --name "AI-Image-Inspector" \
          main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AI-Image-Inspector-${{ runner.os }}
        # Capturamos a pasta inteira dentro de dist para garantir que o .exe (Win) 
        # ou o binário (Unix) sejam incluídos com suas DLLs/Libs
        path: dist/AI-Image-Inspector/