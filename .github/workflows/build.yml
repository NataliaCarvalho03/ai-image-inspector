name: Build and Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*' # Garante que o workflow rode ao detectar tags de versão
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Ensure models dir exists
      run: mkdir -p models

    - name: Build with PyInstaller
      shell: bash
      run: |
        pyinstaller --noconfirm --onedir --windowed \
          --add-data "models:models" \
          --name "AI-Image-Inspector" \
          main.py

    - name: Zip Artifact (Prepare for Release)
      shell: bash
      run: |
        cd dist
        # Compacta a pasta gerada para facilitar o download
        if [ "${{ runner.os }}" == "Windows" ]; then
          7z a ../AI-Image-Inspector-${{ runner.os }}.zip AI-Image-Inspector/
        else
          zip -r ../AI-Image-Inspector-${{ runner.os }}.zip AI-Image-Inspector/
        fi
        cd ..

    - name: Upload Artifact (For Actions Tab)
      uses: actions/upload-artifact@v4
      with:
        name: AI-Image-Inspector-${{ runner.os }}
        path: AI-Image-Inspector-${{ runner.os }}.zip

    - name: Create or Update Release
      uses: softprops/action-gh-release@v1
      # Só executa este passo se o evento for uma criação de tag
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: AI-Image-Inspector-${{ runner.os }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}